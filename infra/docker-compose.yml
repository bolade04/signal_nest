# Optional LOCAL full-mode stack for SignalNest (Phase 3A.4b Batch 4).
#
# This is a developer convenience for exercising the production images against
# real PostgreSQL and Redis. It is NOT a production deployment manifest: the
# passwords are throwaway, and orchestration/secrets/scaling belong to the real
# platform. See docs/operations/deployment.md.
#
#   docker compose -f infra/docker-compose.yml up --build
#
# The migration actor (`migrate`) runs once and must complete before `api` and
# `worker` start — replicas never migrate themselves.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: signalnest
      POSTGRES_PASSWORD: signalnest
      POSTGRES_DB: signalnest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalnest"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No published port by default; the app services reach it on the compose network.

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Shared full-mode configuration for every app container.
  # (YAML anchor reused by migrate / api / worker below.)
  x-app-env: &app-env
    APP_MODE: full
    ENVIRONMENT: staging
    DATABASE_URL: postgresql+psycopg://signalnest:signalnest@postgres:5432/signalnest
    QUEUE_BACKEND: redis
    CACHE_BACKEND: redis
    STORAGE_BACKEND: s3
    VECTOR_BACKEND: pgvector
    JOB_QUEUE_BACKEND: local
    REDIS_URL: redis://redis:6379/0
    LLM_PROVIDER: mock
    # A non-default secret is required outside development; this is a LOCAL throwaway.
    SECRET_KEY: local-compose-development-secret-not-for-production

  # One-shot single migration actor. Runs to completion, then exits.
  migrate:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: worker
    image: signalnest-worker:local
    command: ["python", "-m", "app.db.migrate"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: api
    image: signalnest-api:local
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: signalnest-worker:local
    command: ["python", "-m", "app.jobs.worker"]
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
