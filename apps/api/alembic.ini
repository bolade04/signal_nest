# Alembic configuration for the SignalNest API.
#
# The database URL is NOT hard-coded here: alembic/env.py reads it from the
# application Settings (env var DATABASE_URL / .env), so migrations always target the
# same database the app uses in local (SQLite) or full (PostgreSQL) mode.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Timestamped, slug-based revision filenames for readable history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sqlalchemy.url is intentionally left blank; env.py injects it from Settings.
sqlalchemy.url =

[post_write_hooks]
# Auto-format generated migrations with ruff (invoked via the module so it works with
# the venv install regardless of console-script entrypoint metadata).
hooks = ruff
ruff.type = exec
ruff.executable = python
ruff.options = -m ruff check --fix %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
